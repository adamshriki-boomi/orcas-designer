<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // SPA redirect for GitHub Pages with static export.
      // Dynamic routes like /projects/[id] only have a pre-rendered "placeholder"
      // page, so we redirect to that page with the real ID as a query param.
      var basePath = '/orcas-designer';
      var path = window.location.pathname;
      if (path.startsWith(basePath)) {
        path = path.slice(basePath.length);
      }
      var projectMatch = path.match(/^\/projects\/([^\/]+)$/);
      if (projectMatch && projectMatch[1] !== 'new' && projectMatch[1] !== 'placeholder') {
        window.location.replace(
          basePath + '/projects/placeholder?_id=' + encodeURIComponent(projectMatch[1])
        );
      } else {
        var redirect = path + window.location.search + window.location.hash;
        window.location.replace(
          basePath + '/?redirect=' + encodeURIComponent(redirect)
        );
      }
    </script>
  </head>
  <body></body>
</html>
