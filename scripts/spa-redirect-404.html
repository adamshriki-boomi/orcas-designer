<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Single-page app redirect for GitHub Pages
      // Converts the current path into a query param and redirects to the root
      // so the client-side router can handle it.
      var basePath = '/orcas-designer';
      var path = window.location.pathname;
      if (path.startsWith(basePath)) {
        path = path.slice(basePath.length);
      }
      var redirect = path + window.location.search + window.location.hash;
      window.location.replace(
        basePath + '/?redirect=' + encodeURIComponent(redirect)
      );
    </script>
  </head>
  <body></body>
</html>
