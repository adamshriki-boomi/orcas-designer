<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // SPA redirect for GitHub Pages with static export.
      // Dynamic routes like /prompt-generator/[id] only have a pre-rendered
      // "placeholder" page, so we redirect to that page with the real ID
      // as a query param.
      var basePath = '/orcas-designer';
      var path = window.location.pathname;
      if (path.startsWith(basePath)) {
        path = path.slice(basePath.length);
      }
      var promptMatch = path.match(/^\/prompt-generator\/([^\/]+)$/);
      if (promptMatch && promptMatch[1] !== 'new' && promptMatch[1] !== 'placeholder') {
        window.location.replace(
          basePath + '/prompt-generator/placeholder?_id=' + encodeURIComponent(promptMatch[1])
        );
      } else if ((function() {
        var uxMatch = path.match(/^\/ux-writer\/([^\/]+)$/);
        return uxMatch && uxMatch[1] !== 'new' && uxMatch[1] !== 'placeholder';
      })()) {
        var uxId = path.match(/^\/ux-writer\/([^\/]+)$/)[1];
        window.location.replace(
          basePath + '/ux-writer/placeholder?_id=' + encodeURIComponent(uxId)
        );
      } else {
        var redirect = path + window.location.search + window.location.hash;
        window.location.replace(
          basePath + '/?redirect=' + encodeURIComponent(redirect)
        );
      }
    </script>
  </head>
  <body></body>
</html>
